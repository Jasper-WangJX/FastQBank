# Production stack: postgres + FastAPI server + Caddy (TLS + SPA + proxy).
# Secrets/config come from deploy/.env.prod (NOT committed — copy it from
# env.prod.example and fill real values on the VPS).
#
#   Build & start:  docker compose -f deploy/docker-compose.prod.yml up -d --build
#   Logs:           docker compose -f deploy/docker-compose.prod.yml logs -f
#   Stop:           docker compose -f deploy/docker-compose.prod.yml down

name: aqb-prod

services:
  postgres:
    image: postgres:16
    container_name: aqb-prod-postgres
    env_file: .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$ -> literal $, expanded by the shell inside the container using
      # the POSTGRES_* vars from .env.prod.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: ../apps/server
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    # Internal only — Caddy is the sole public entrypoint.
    expose:
      - "8000"
    restart: unless-stopped

  caddy:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
      args:
        # Baked into the SPA at build time (config.ts reads it).
        VITE_API_BASE_URL: "https://api.fastqbank.com"
    container_name: aqb-prod-caddy
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Persist issued certificates across restarts (avoids LE rate limits).
      - caddy_data:/data
      - caddy_config:/config
      # Windows installer payload — bind-mounted read-only so we can
      # `scp` new builds onto the host without rebuilding the image.
      # The host directory MUST exist before `docker compose up` runs
      # (Compose will create an empty one otherwise but Caddy then 404s
      # every /download/* request). See deploy/Caddyfile for the route.
      - /opt/fastqbank/downloads:/srv/downloads:ro
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
