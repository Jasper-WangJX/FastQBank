<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>FastQBank | Build your own question bank with AI</title>
    <meta name="description"
      content="Collect, tag, and review multiple-choice questions with AI assistance — OCR from screenshots, auto-tag, knowledge-summary generation, flashcards review, and cross-account sharing." />
    <meta name="application-name" content="FastQBank" />

    <!-- Favicon: same file the in-app header uses -->
    <link rel="icon" type="image/png" href="/fastqb-logo.png" />
    <link rel="apple-touch-icon" href="/fastqb-logo.png" />

    <!-- Open Graph (shows when the URL is pasted into chat / Discord /
         social media). og:image needs an absolute URL for most platforms. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FastQBank" />
    <meta property="og:title"
      content="FastQBank — AI-assisted question bank" />
    <meta property="og:description"
      content="OCR screenshots into questions, AI-tag, review with flashcards, share between accounts." />
    <meta property="og:url" content="https://fastqbank.com/" />
    <meta property="og:image" content="https://fastqbank.com/fastqb-logo.png" />

    <!-- Twitter card (same content, different namespace) -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title"
      content="FastQBank — AI-assisted question bank" />
    <meta name="twitter:description"
      content="OCR screenshots into questions, AI-tag, review with flashcards, share between accounts." />
    <meta name="twitter:image" content="https://fastqbank.com/fastqb-logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
